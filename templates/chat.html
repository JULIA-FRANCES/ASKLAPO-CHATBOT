<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Assistant Chat Interface">
    <title>LAPO MfB Assistant</title>
    <style>
        :root {
            --bg-color: #0a0a0f;
            --surface: #13131f;
            --surface-light: #1a1a2e;
            --surface-hover: #22223a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.15);
            --user-bubble: #1e1b4b;
            --user-bubble-border: #312e81;
            --ai-bubble: #1c1917;
            --ai-bubble-border: #292524;
            --input-bg: #0f0f1a;
            --border: #1e1e2e;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .ai-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .ai-avatar svg {
            color: white;
        }

        .header-info h1 {
            font-size: 1rem;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.75rem;
            color: var(--success);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .messages-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Welcome State */
        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            background: var(--surface-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .welcome h2 {
            color: var(--text-primary);
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .welcome p {
            font-size: 0.875rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .message.user .message-avatar {
            background: var(--user-bubble);
            color: var(--accent-light);
            border: 1px solid var(--user-bubble-border);
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
        }

        .message-content {
            padding: 0.875rem 1.125rem;
            border-radius: 12px;
            font-size: 0.9375rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border: 1px solid var(--user-bubble-border);
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: var(--ai-bubble);
            border: 1px solid var(--ai-bubble-border);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 0.6875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            padding: 0 0.25rem;
        }

        .message.user .message-meta {
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--ai-bubble);
            border: 1px solid var(--ai-bubble-border);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            padding: 1rem 1.25rem;
            margin-left: 2.5rem;
        }

        .typing-indicator.active {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* Input Area */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
        }

        .input-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #message {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            min-height: 24px;
            line-height: 1.5;
        }

        #message::placeholder {
            color: #64748b;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            transition: transform 0.2s;
        }

        .send-btn:hover svg {
            transform: translateX(1px);
        }

        /* Error Toast */
        .toast {
            position: fixed;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--error);
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 100;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Scroll to bottom button */
        .scroll-bottom {
            position: fixed;
            bottom: 5.5rem;
            right: 1.5rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 50;
        }

        .scroll-bottom.visible {
            display: flex;
        }

        .scroll-bottom:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .chat-header {
                padding: 0.75rem 1rem;
            }
            
            .chat-container {
                padding: 1rem;
            }
            
            .message {
                max-width: 92%;
            }
            
            .input-area {
                padding: 0.75rem 1rem;
            }
        }

        /* Markdown-like styling for AI responses */
        .message-content pre {
            background: #0f0f1a;
            padding: 0.75rem;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.875rem;
            margin: 0.5rem 0;
            border: 1px solid var(--border);
        }

        .message-content code {
            background: #0f0f1a;
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        .message-content p {
            margin-bottom: 0.75rem;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <header class="chat-header">
        <div class="header-left">
            <div class="ai-avatar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7v1h1a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h1v-1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"></path>
                    <circle cx="7.5" cy="14.5" r="1.5"></circle>
                    <circle cx="16.5" cy="14.5" r="1.5"></circle>
                </svg>
            </div>
            <div class="header-info">
                <h1>AskLAPO</h1>
                <div class="status">
                    <span class="status-dot"></span>
                    Online
                </div>
            </div>
        </div>
    </header>

    <main class="chat-container" id="chatContainer">
        <div class="messages-wrapper" id="chatBox">
            <div class="welcome" id="welcomeMessage">
                <div class="welcome-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7v1h1a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h1v-1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"></path>
                        <circle cx="7.5" cy="14.5" r="1.5"></circle>
                        <circle cx="16.5" cy="14.5" r="1.5"></circle>
                    </svg>
                </div>
                <h2>Welcome to LAPO MfB</h2>
                <p>Ask me about our loans, savings, account opening, eligibility, and more. I DEY YOUR BACK</p>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </main>

    <div class="input-area">
        <div class="input-wrapper">
            <div class="input-container">
                <textarea 
                    id="message" 
                    placeholder="Ask something..." 
                    rows="1"
                    onkeydown="handleKeydown(event)"
                ></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <button class="scroll-bottom" id="scrollBottom" onclick="scrollToBottom()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </button>

    <div class="toast" id="toast">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="toastMessage">Something went wrong</span>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const scrollBottomBtn = document.getElementById('scrollBottom');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        let isProcessing = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Handle Enter key (Shift+Enter for new line)
        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Scroll handling
        chatContainer.addEventListener('scroll', function() {
            const isNearBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 100;
            scrollBottomBtn.classList.toggle('visible', !isNearBottom);
        });

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        function autoScroll() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Toast notification
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Format timestamp
        function getTimestamp() {
            return new Date().toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Simple markdown-like formatting
        function formatMessage(text) {
            return escapeHtml(text)
                .replace(/\n/g, '<br>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message || isProcessing) return;

            // Hide welcome message on first message
            if (welcomeMessage) {
                welcomeMessage.style.display = 'none';
            }

            isProcessing = true;
            sendBtn.disabled = true;

            // Add user message
            const userMessageId = 'msg-' + Date.now();
            const userHtml = `
                <div class="message user" id="${userMessageId}">
                    <div class="message-avatar">You</div>
                    <div>
                        <div class="message-content">${formatMessage(message)}</div>
                        <div class="message-meta">${getTimestamp()}</div>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', userHtml);
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
            autoScroll();

            // Show typing indicator
            typingIndicator.classList.add('active');
            autoScroll();

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // Hide typing indicator
                typingIndicator.classList.remove('active');

                // Add AI response
                const aiMessageId = 'msg-' + Date.now();
                const aiHtml = `
                    <div class="message ai" id="${aiMessageId}">
                        <div class="message-avatar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7v1h1a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h1v-1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"></path>
                                <circle cx="7.5" cy="14.5" r="1.5"></circle>
                                <circle cx="16.5" cy="14.5" r="1.5"></circle>
                            </svg>
                        </div>
                        <div>
                            <div class="message-content">${formatMessage(data.answer)}</div>
                            <div class="message-meta">${getTimestamp()}</div>
                        </div>
                    </div>
                `;
                chatBox.insertAdjacentHTML('beforeend', aiHtml);
                autoScroll();

            } catch (error) {
                typingIndicator.classList.remove('active');
                showToast('Failed to get response. Please try again.');
                console.error('Error:', error);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Focus input on load
        messageInput.focus();
    </script>

</body>
</html>
